services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      PORT: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  telegram-bot:
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      TZ: Europe/Kyiv
      SERVER_URL: http://server:3000
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
      server:
        condition: service_healthy
    restart: unless-stopped

volumes:
  redis-data:
